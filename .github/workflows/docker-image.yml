# =============================================================================
# 动火离人安全监测系统 (DHLR) - Docker Image Release
# 仅在发布 Release 时构建并推送到阿里云容器镜像仓库
# =============================================================================

name: Docker Image Release

on:
  # 仅在发布 Release 时触发
  release:
    types: [published]
  # 允许手动触发 (用于紧急发版)
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (留空则使用 latest)'
        required: false
        default: ''

env:
  # 阿里云容器镜像仓库配置
  REGISTRY: crpi-ysk9v7z15tyb8r02.cn-hangzhou.personal.cr.aliyuncs.com
  IMAGE_NAME: ysl_1/ai_dhlr

jobs:
  # ---------------------------------------------------------------------------
  # 构建并推送 Docker 镜像
  # ---------------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Docker Buildx (支持多平台构建)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录到阿里云容器镜像仓库
      - name: Log in to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALICLOUD_REGISTRY_USERNAME }}
          password: ${{ secrets.ALICLOUD_REGISTRY_PASSWORD }}

      # 4. 提取 Docker 元数据 (标签和版本)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Release 触发: 使用版本号 (如 v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}},enable=${{ github.event_name == 'release' }}
            # 始终添加 latest 标签
            type=raw,value=latest
            # 手动触发: 使用自定义标签或 SHA
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
            # 使用 commit SHA 作为标签
            type=sha,prefix=,format=short

      # 5. 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # 指定构建目标为 production 阶段
          target: production
          # Release 或手动触发时推送镜像
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 启用缓存以加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 构建参数
          build-args: |
            BUILD_DATE=${{ github.event.release.published_at || github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.event.release.tag_name || 'dev' }}

      # 6. 输出构建结果
      - name: Image digest
        run: |
          echo "## 🐳 Docker Image Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | \`${{ env.REGISTRY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Release** | \`${{ github.event.release.tag_name || 'manual' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Tags" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Pull Command" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

