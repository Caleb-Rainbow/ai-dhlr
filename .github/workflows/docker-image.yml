# =============================================================================
# 动火离人安全监测系统 (DHLR) - Docker Image CI/CD
# 自动构建并推送到阿里云容器镜像仓库
# =============================================================================

name: Docker Image CI/CD

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'  # 支持版本标签触发
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 允许手动触发

env:
  # 阿里云容器镜像仓库配置
  REGISTRY: crpi-ysk9v7z15tyb8r02.cn-hangzhou.personal.cr.aliyuncs.com
  IMAGE_NAME: ysl_1/ai_dhlr

jobs:
  # ---------------------------------------------------------------------------
  # 构建并推送 Docker 镜像
  # ---------------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Docker Buildx (支持多平台构建)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录到阿里云容器镜像仓库
      - name: Log in to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALICLOUD_REGISTRY_USERNAME }}
          password: ${{ secrets.ALICLOUD_REGISTRY_PASSWORD }}

      # 4. 提取 Docker 元数据 (标签和版本)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 对于 main 分支推送，使用 latest 标签
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # 对于标签推送，使用版本号
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # 使用 commit SHA 作为标签
            type=sha,prefix=,format=short
            # 使用时间戳作为标签
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      # 5. 构建并推送 Docker 镜像 (仅在 main 分支推送时推送)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # 指定构建目标为 production 阶段
          target: production
          # 仅在 main 分支推送时才推送镜像
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 启用缓存以加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 构建参数
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      # 6. 输出构建结果
      - name: Image digest
        run: |
          echo "## 🐳 Docker Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pushed:** ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}" >> $GITHUB_STEP_SUMMARY
