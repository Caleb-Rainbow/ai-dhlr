# =============================================================================
# 动火离人安全监测系统 (DHLR) - 持续集成 (CI)
# 每次推送和 PR 时运行: Python 测试 + Vite 前端构建
# =============================================================================

name: CI

on:
  push:
    branches: [ "main", "dev", "feature/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 允许手动触发

jobs:
  # ---------------------------------------------------------------------------
  # Python 单元测试
  # ---------------------------------------------------------------------------
  python-test:
    name: 🐍 Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 清理磁盘空间 (释放约 30GB)
      - name: Free disk space
        run: |
          echo "=== 清理前磁盘使用情况 ==="
          df -h
          echo ""
          echo "=== 开始清理 ==="
          # 删除不需要的大型预装软件
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          # 清理 Docker 镜像
          sudo docker image prune --all --force || true
          # 清理 apt 缓存
          sudo apt-get clean
          echo ""
          echo "=== 清理后磁盘使用情况 ==="
          df -h

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 安装系统依赖 (OpenCV 等需要)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender1 \
            libasound2t64 \
            libportaudio2 \
            libsndfile1

      # 安装 Python 依赖 (排除大型 ML 框架，CI 只需测试核心逻辑)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # 排除 RKNN、ultralytics、torch 等大型包 (CI 不需要推理功能)
          grep -vE "rknn|ultralytics|torch" requirements.txt > requirements-ci.txt || cp requirements.txt requirements-ci.txt
          # 显示将要安装的依赖
          echo "=== CI 依赖列表 ==="
          cat requirements-ci.txt
          echo ""
          pip install -r requirements-ci.txt
          # 安装测试依赖
          pip install pytest pytest-asyncio pytest-cov

      # 运行单元测试并生成覆盖率报告
      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term-missing -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      # 上传覆盖率报告 (可选: 对接 Codecov)
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Vite 前端构建
  # ---------------------------------------------------------------------------
  frontend-build:
    name: 🎨 Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web/fire-monitor-ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/fire-monitor-ui/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # TypeScript 类型检查
      - name: TypeScript type check
        run: npx vue-tsc --noEmit

      # 构建生产版本
      - name: Build production bundle
        run: npm run build

      # 上传构建产物 (可用于后续部署或预览)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/fire-monitor-ui/dist
          retention-days: 7

  # ---------------------------------------------------------------------------
  # CI 状态汇总
  # ---------------------------------------------------------------------------
  ci-summary:
    name: ✅ CI Summary
    runs-on: ubuntu-latest
    needs: [python-test, frontend-build]
    if: always()

    steps:
      - name: Check CI status
        run: |
          echo "## 🔍 CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Tests | ${{ needs.python-test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend-build.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: ${{ needs.python-test.result == 'failure' || needs.frontend-build.result == 'failure' }}
        run: exit 1
