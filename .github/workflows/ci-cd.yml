# =============================================================================
# 动火离人安全监测系统 (DHLR) - GitHub Actions CI/CD 工作流
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:  # 允许手动触发

env:
  REGISTRY: ghcr.io  # 使用 GitHub Container Registry
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # 代码质量检查
  # ---------------------------------------------------------------------------
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install flake8 black isort

      - name: 运行 Flake8
        run: flake8 src/ --max-line-length=120 --ignore=E501,W503

      - name: 检查代码格式 (Black)
        run: black --check src/

      - name: 检查导入排序 (isort)
        run: isort --check-only src/

  # ---------------------------------------------------------------------------
  # 单元测试
  # ---------------------------------------------------------------------------
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: 运行测试
        run: |
          pytest tests/ \
            --junitxml=junit.xml \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: 上传测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            junit.xml
            coverage.xml

      - name: 上传覆盖率到 Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # 前端构建测试
  # ---------------------------------------------------------------------------
  frontend-build:
    name: 前端构建
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/fire-monitor-ui/package-lock.json

      - name: 安装依赖
        working-directory: web/fire-monitor-ui
        run: npm ci

      - name: 构建前端
        working-directory: web/fire-monitor-ui
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/fire-monitor-ui/dist

  # ---------------------------------------------------------------------------
  # 构建 Docker 镜像
  # ---------------------------------------------------------------------------
  build-image:
    name: 构建 Docker 镜像
    runs-on: ubuntu-latest
    needs: [test, frontend-build]
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: 构建并推送 Docker 镜像
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ---------------------------------------------------------------------------
  # 部署到测试环境 (develop 分支)
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: 部署到测试环境
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: 部署到测试服务器
        run: |
          echo "部署镜像: ${{ needs.build-image.outputs.image-tag }}"
          # 在这里添加你的部署逻辑，例如:
          # - SSH 连接到服务器并拉取新镜像
          # - 使用 kubectl apply 部署到 Kubernetes
          # - 使用 docker-compose 更新服务

  # ---------------------------------------------------------------------------
  # 部署到生产环境 (main 分支或 tag)
  # ---------------------------------------------------------------------------
  deploy-production:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: build-image
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
    environment:
      name: production
      url: https://example.com
    steps:
      - name: 部署到生产服务器
        run: |
          echo "部署镜像: ${{ needs.build-image.outputs.image-tag }}"
          # 在这里添加你的生产部署逻辑

  # ---------------------------------------------------------------------------
  # 创建 Release (仅在 tag 时)
  # ---------------------------------------------------------------------------
  release:
    name: 创建 Release
    runs-on: ubuntu-latest
    needs: [build-image, deploy-production]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## Docker 镜像
            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ## 更新日志
            请查看提交历史获取详细更改信息。
