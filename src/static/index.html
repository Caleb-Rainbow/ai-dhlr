<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>动火离人安全监测系统</title>
    <meta name="description" content="厨房安全监测系统 - 动火离人检测与自动切电">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
</head>

<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="app-header">
            <div class="header-title">
                <span class="logo">🔥</span>
                <h1>动火安全监测</h1>
            </div>
            <div class="header-status">
                <span id="connection-status" class="status-dot offline"></span>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="app-main" id="main-content">
            <!-- 动态加载内容 -->
        </main>

        <!-- 底部导航 -->
        <nav class="app-nav">
            <a href="#/" class="nav-item active" data-page="dashboard">
                <span class="nav-icon">📊</span>
                <span class="nav-label">监控</span>
            </a>
            <a href="#/cameras" class="nav-item" data-page="cameras">
                <span class="nav-icon">📷</span>
                <span class="nav-label">摄像头</span>
            </a>
            <a href="#/zones" class="nav-item" data-page="zones">
                <span class="nav-icon">🍳</span>
                <span class="nav-label">灶台</span>
            </a>
            <a href="#/logs" class="nav-item" data-page="logs">
                <span class="nav-icon">📋</span>
                <span class="nav-label">日志</span>
            </a>
            <a href="#/settings" class="nav-item" data-page="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">设置</span>
            </a>
        </nav>
    </div>

    <!-- 页面模板 -->
    <!-- 仪表盘页面 -->
    <template id="tpl-dashboard">
        <div class="page dashboard-page">
            <div class="page-header">
                <h2>实时监控</h2>
                <span class="device-info" id="device-info"></span>
            </div>

            <div class="zone-cards" id="zone-cards">
                <!-- 灶台卡片动态加载 -->
            </div>

            <div class="quick-actions">
                <h3>快捷操作</h3>
                <div class="action-buttons">
                    <button class="btn btn-warning" onclick="App.resetAllZones()">
                        🔄 全部复位
                    </button>
                    <button class="btn btn-secondary" onclick="App.refreshStatus()">
                        🔃 刷新状态
                    </button>
                </div>
            </div>

            <!-- 性能监控面板 -->
            <div class="performance-panel">
                <h3>🚀 推理性能</h3>
                <div class="performance-grid" id="performance-stats">
                    <div class="perf-item">
                        <span class="perf-label">推理引擎</span>
                        <span class="perf-value" id="perf-engine">-</span>
                    </div>
                    <div class="perf-item">
                        <span class="perf-label">推理时间</span>
                        <span class="perf-value" id="perf-inference-time">- ms</span>
                    </div>
                    <div class="perf-item">
                        <span class="perf-label">平均时间</span>
                        <span class="perf-value" id="perf-avg-time">- ms</span>
                    </div>
                    <div class="perf-item">
                        <span class="perf-label">FPS</span>
                        <span class="perf-value" id="perf-fps">-</span>
                    </div>
                    <div class="perf-item">
                        <span class="perf-label">CPU</span>
                        <span class="perf-value" id="perf-cpu">- %</span>
                    </div>
                    <div class="perf-item">
                        <span class="perf-label">内存</span>
                        <span class="perf-value" id="perf-memory">- MB</span>
                    </div>
                    <div class="perf-item">
                        <span class="perf-label">NPU</span>
                        <span class="perf-value" id="perf-npu">- %</span>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- 摄像头管理页面 -->
    <template id="tpl-cameras">
        <div class="page cameras-page">
            <div class="page-header">
                <h2>摄像头管理</h2>
                <button class="btn btn-primary btn-sm" onclick="App.showAddCameraModal()">
                    ➕ 添加
                </button>
            </div>

            <div class="camera-list" id="camera-list">
                <!-- 摄像头列表动态加载 -->
            </div>
        </div>
    </template>

    <!-- 灶台配置页面 -->
    <template id="tpl-zones">
        <div class="page zones-page">
            <div class="page-header">
                <h2>灶台配置</h2>
                <button class="btn btn-primary btn-sm" onclick="App.showAddZoneModal()">
                    ➕ 添加
                </button>
            </div>

            <div class="zone-config-list" id="zone-config-list">
                <!-- 灶台配置列表动态加载 -->
            </div>
        </div>
    </template>

    <!-- 日志查看页面 -->
    <template id="tpl-logs">
        <div class="page logs-page">
            <div class="page-header">
                <h2>系统日志</h2>
                <div class="header-actions">
                    <select id="log-file-selector" onchange="App.loadLogContent(this.value)">
                        <!-- 日志文件列表 -->
                    </select>
                    <button class="btn btn-secondary btn-sm" onclick="App.refreshLogs()">
                        🔃 刷新
                    </button>
                </div>
            </div>

            <!-- 告警截图已移除 -->

            <div class="log-content-section">
                <h3>日志内容</h3>
                <div class="log-viewer">
                    <pre id="log-content">正在加载日志...</pre>
                </div>
            </div>
        </div>
    </template>

    <!-- 设置页面 -->
    <template id="tpl-settings">
        <div class="page settings-page">
            <div class="page-header">
                <h2>系统设置</h2>
            </div>

            <div class="settings-section">
                <h3>设备信息</h3>
                <div class="info-card" id="device-detail-info">
                    <!-- 设备信息动态加载 -->
                </div>
            </div>

            <div class="settings-section">
                <h3>全局参数</h3>
                <div class="form-group">
                    <label>预警超时时间（秒）</label>
                    <input type="number" id="global-warning-timeout" value="30" min="5" max="300">
                </div>
                <div class="form-group">
                    <label>切电超时时间（秒）</label>
                    <input type="number" id="global-cutoff-timeout" value="60" min="10" max="600">
                </div>
                <button class="btn btn-primary" onclick="App.saveGlobalSettings()">
                    💾 保存设置
                </button>
            </div>

            <!-- TTS 测试面板 -->
            <div class="tts-test-panel">
                <h3>🔊 语音测试</h3>
                <div class="input-group">
                    <input type="text" id="tts-test-text" placeholder="输入测试文本（可选）">
                    <button class="btn btn-secondary" onclick="App.testTTS()">
                        播放测试
                    </button>
                </div>
            </div>

            <div class="settings-section">
                <h3>系统操作</h3>
                <div class="action-buttons">
                    <button class="btn btn-warning" onclick="App.restartSystem()">
                        🔄 重启系统
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- 添加摄像头模态框 -->
    <template id="tpl-add-camera-modal">
        <div class="modal-overlay" onclick="App.closeModal()">
            <div class="modal" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <h3>添加摄像头</h3>
                    <button class="modal-close" onclick="App.closeModal()">×</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>摄像头ID</label>
                        <input type="text" id="cam-id" placeholder="如: cam_1">
                    </div>
                    <div class="form-group">
                        <label>名称</label>
                        <input type="text" id="cam-name" placeholder="如: 厨房摄像头1">
                    </div>
                    <div class="form-group">
                        <label>类型</label>
                        <select id="cam-type" onchange="App.toggleCameraTypeFields()">
                            <option value="usb">USB摄像头</option>
                            <option value="rtsp">IP摄像头(RTSP)</option>
                        </select>
                    </div>
                    <div class="form-group usb-field">
                        <label>选择设备</label>
                        <select id="cam-device">
                            <option value="0">设备 0</option>
                        </select>
                        <small class="form-hint" id="usb-scan-hint"
                            style="display:none; color: #f39c12;">正在扫描设备...</small>
                    </div>
                    <div class="form-group rtsp-field" style="display:none;">
                        <label>RTSP地址</label>
                        <input type="text" id="cam-rtsp" placeholder="rtsp://ip:port/stream">
                    </div>
                    <div class="form-group rtsp-field" style="display:none;">
                        <label>用户名</label>
                        <input type="text" id="cam-username">
                    </div>
                    <div class="form-group rtsp-field" style="display:none;">
                        <label>密码</label>
                        <input type="text" id="cam-password">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="App.closeModal()">取消</button>
                    <button class="btn btn-primary" onclick="App.addCamera()">添加</button>
                </div>
            </div>
        </div>
    </template>

    <!-- 添加灶台模态框 -->
    <template id="tpl-add-zone-modal">
        <div class="modal-overlay" onclick="App.closeModal()">
            <div class="modal" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <h3>添加灶台</h3>
                    <button class="modal-close" onclick="App.closeModal()">×</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>灶台名称</label>
                        <input type="text" id="zone-name" placeholder="如: 2号灶台">
                    </div>
                    <div class="form-group">
                        <label>关联摄像头</label>
                        <select id="zone-camera">
                            <!-- 动态加载 -->
                        </select>
                    </div>
                    <div class="form-hint">
                        <p>💡 预警/切电超时时间使用全局设置，可在"设置"页面修改</p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="App.closeModal()">取消</button>
                    <button class="btn btn-primary" onclick="App.addZone()">添加</button>
                </div>
            </div>
        </div>
    </template>

    <!-- ROI编辑模态框 -->
    <template id="tpl-roi-editor-modal">
        <div class="modal-overlay" onclick="App.closeModal()">
            <div class="modal modal-large" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <h3>编辑ROI区域 - <span id="roi-zone-name"></span></h3>
                    <button class="modal-close" onclick="App.closeModal()">×</button>
                </div>
                <div class="modal-body">
                    <div class="roi-canvas-container">
                        <canvas id="roi-canvas"></canvas>
                        <img id="roi-preview" crossorigin="anonymous">
                    </div>
                    <div class="roi-instructions">
                        <p>点击画面添加ROI顶点（至少3个），形成封闭多边形区域</p>
                    </div>
                    <div class="roi-actions">
                        <button class="btn btn-secondary" onclick="App.clearRoi()">清除</button>
                        <button class="btn btn-secondary" onclick="App.undoRoiPoint()">撤销</button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="App.closeModal()">取消</button>
                    <button class="btn btn-primary" onclick="App.saveRoi()">保存ROI</button>
                </div>
            </div>
        </div>
    </template>

    <!-- 摄像头预览模态框 -->
    <template id="tpl-camera-preview-modal">
        <div class="modal-overlay" onclick="App.closeModal()">
            <div class="modal modal-large" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <h3>摄像头预览 - <span id="preview-camera-name"></span></h3>
                    <button class="modal-close" onclick="App.closeModal()">×</button>
                </div>
                <div class="modal-body">
                    <div class="preview-container">
                        <img id="camera-preview-img" src="" alt="摄像头预览">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="App.closeModal()">关闭</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Toast 消息 -->
    <div id="toast-container"></div>

    <script src="/static/js/app.js"></script>
</body>

</html>
